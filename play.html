<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — Necessary Cuts</title>
<meta name="description" content="An interactive fragment from Necessary Cuts by Chris Dodds.">
<link rel="canonical" href="https://necessarycuts.com/play">
<link rel="stylesheet" href="css/marketing.css">
<link rel="stylesheet" href="css/game.css">
</head>
<body>

<canvas id="ambient-canvas"></canvas>
<div id="scene-overlay"></div>

<div id="title-screen">
  <h1>Necessary Cuts</h1>
  <div class="subtitle">a second-person interactive fragment</div>
  <div class="headphones-note">headphones recommended</div>
  <div class="start-prompt">click anywhere to begin</div>
</div>

<div id="game" style="display:none;">
  <div class="scene-label" id="scene-label"></div>
  <div id="narrative"></div>
  <div id="choices"></div>
</div>

<div id="sound-hint">
  <div class="speaker-icon">
    <div class="speaker-body"></div>
    <div class="speaker-wave wave1"></div>
    <div class="speaker-wave wave2"></div>
    <div class="speaker-slash"></div>
  </div>
</div>

<script src="js/audio-engine.js"></script>
<script src="js/story.js"></script>
<script src="js/canvas.js"></script>
<script src="js/engine.js"></script>
<script data-goatcounter="https://necessarycuts.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
